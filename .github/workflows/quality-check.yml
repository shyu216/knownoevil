name: 部署文档

on:
  push:
    branches:
      - main
      - develop
      - feature/**
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '0 0 * * 0'  # 每周日运行一次

permissions:
  contents: write
  issues: write  # 确保有创建 issue 的权限

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      
      - name: 缓存构建依赖
        uses: actions/cache@v5
        with:
          path: |
            **/node_modules
            .cache
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
      
      - name: 安装依赖
        run: |
          corepack enable
          npm ci --legacy-peer-deps
      
      - name: 代码检查
        id: lint
        run: |
          npm run lint || echo "::set-output name=lint_failed::true"
      
      - name: 依赖安全检查
        id: audit
        run: |
          npm audit --production || echo "::set-output name=audit_failed::true"
      
      - name: 创建代码质量问题 Issue
        if: failure()
        run: |
          gh auth setup-git
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          gh issue create \
            --title "代码质量检查失败" \
            --body "## 代码质量检查失败\n\n### 失败详情\n- 分支: ${{ github.ref_name }}\n- 提交: ${{ github.sha }}\n- 触发事件: ${{ github.event_name }}\n\n### 可能的问题\n- 代码检查 (lint) 失败\n- 依赖安全检查 (audit) 失败\n\n### 请检查以下文件：\n- 所有修改过的 src/ 目录下的文件\n- package.json 和 package-lock.json\n\n### 建议\n1. 运行 `npm run lint` 本地检查并修复代码问题\n2. 运行 `npm audit` 检查并更新有安全漏洞的依赖\n3. 修复后再次提交代码" \
            --label "代码质量" \
            --label "bug"

  test:
    runs-on: ubuntu-latest
    needs: code-quality
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
        
      - name: 缓存构建依赖
        uses: actions/cache@v5
        with:
          path: |
            **/node_modules
            .cache
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
      
      - name: 安装依赖
        run: |
          corepack enable
          npm ci --legacy-peer-deps
      
      - name: 构建文档
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: |-
          npm run docs:build
          > src/.vuepress/dist/.nojekyll
      
      - name: 启动本地服务器
        run: |
          npx serve src/.vuepress/dist --port 8080 &
          sleep 5
      
      - name: 链接检查
        id: link-check
        run: |
          npm install -g broken-link-checker
          blc http://localhost:8080 -ro --exclude-external || echo "::set-output name=link_check_failed::true"
      
      - name: 创建测试失败 Issue
        if: failure()
        run: |
          gh auth setup-git
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          gh issue create \
            --title "测试失败" \
            --body "## 测试失败\n\n### 失败详情\n- 分支: ${{ github.ref_name }}\n- 提交: ${{ github.sha }}\n- 触发事件: ${{ github.event_name }}\n\n### 失败原因\n- 链接检查失败\n\n### 建议\n1. 检查文档中的链接是否正确\n2. 确保所有链接都能正常访问\n3. 修复后再次提交代码" \
            --label "测试" \
            --label "bug"