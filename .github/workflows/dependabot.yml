# .github/dependabot.yml
version: 2
updates:
  # 配置 npm 依赖更新
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"  # 每周检查一次更新
    open-pull-requests-limit: 10  # 限制同时打开的 PR 数量
    ignore:
      - dependency-name: "some-package"  # 忽略特定包的更新

  # 配置 GitHub Actions 工作流更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"