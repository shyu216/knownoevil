
name: 部署文档

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      
      - name: 缓存构建依赖
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            .cache
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
      
      - name: 安装依赖
        run: |
          corepack enable
          npm ci --legacy-peer-deps
      
      - name: 代码检查
        run: |
          npm run lint
      
      - name: 依赖安全检查
        run: |
          npm audit --production

  build:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      
      - name: 缓存构建依赖
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            .cache
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
      
      - name: 安装依赖
        run: |
          corepack enable
          npm ci --legacy-peer-deps
      
      - name: 构建文档
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: |-
          npm run docs:build
          > src/.vuepress/dist/.nojekyll

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      
      - name: 启动本地服务器
        run: |
          npx serve src/.vuepress/dist --port 8080 &
          sleep 5
      
      - name: 链接检查
        run: |
          npm install -g broken-link-checker
          blc http://localhost:8080 -ro --exclude-external

  deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 部署文档
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: src/.vuepress/dist